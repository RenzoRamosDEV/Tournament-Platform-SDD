[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = test_*.py
python_classes = *Test
python_functions = test_*
testpaths = tests
pythonpath = app
addopts = --ignore=tests/test_integration_pg.py --ignore=tests/tournaments/test_sql_queries.py --ignore=tests/test_setup_script.py --ignore=tests/test_env_config.py
